<!DOCTYPE html>
<html>
<head>
<title>Receipt Reader</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>

<body style="font-family: Arial; padding:20px">

<h2>Upload Receipt</h2>
<input type="file" id="fileInput">

<h3>Result</h3>

Supplier: <input id="supplier"><br><br>
Date: <input id="date" type="date"><br><br>
Category:
<select id="category">
<option>Service</option>
<option>Parts</option>
<option>Insurance</option>
<option>Admin</option>
<option>Other</option>
</select><br><br>

Subtotal: <input id="subtotal"><br><br>
GST/HST: <input id="gst"><br><br>
PST: <input id="pst"><br><br>
Total: <input id="total"><br><br>

<script>
document.getElementById("fileInput").addEventListener("change", async function(e){
  const file = e.target.files[0];
  if (!file) return;

  const { data } = await Tesseract.recognize(file, 'eng');
  const text = data.text.toLowerCase();

  console.log(text);

  // SUPPLIER
  const lines = text.split("\n").filter(l => l.trim());
  document.getElementById("supplier").value = lines[0] || "Unknown";

  // DATE
  const dateMatch = text.match(/(\d{1,2}\/\d{1,2}\/\d{2,4})/);
  if(dateMatch){
    const parts = dateMatch[1].split("/");
    let year = parts[2];
    if(year.length === 2) year = "20" + year;
    document.getElementById("date").value =
      `${year}-${parts[0].padStart(2,"0")}-${parts[1].padStart(2,"0")}`;
  }

  // AMOUNTS
  function getAmount(label){
    const match = text.match(new RegExp(label + ".*?(\\d+\\.\\d{2})"));
    return match ? match[1] : "";
  }

  document.getElementById("subtotal").value = getAmount("subtotal");
  document.getElementById("gst").value = getAmount("gst") || getAmount("hst");
  document.getElementById("pst").value = getAmount("pst");
  document.getElementById("total").value = getAmount("total");

});
</script>

</body>
</html>
