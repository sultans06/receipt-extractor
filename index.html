<!DOCTYPE html>

<html>
<head>
  <title>Receipt Reader</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>

<body style="font-family: Arial; padding:20px">

<h2>Upload Receipt</h2>
<input type="file" id="fileInput">

<h3>Result</h3>

Supplier: <input id="supplier"><br><br>
Date: <input id="date" type="date"><br><br>

Category: <select id="category">

  <option>Service</option>
  <option>Parts</option>
  <option>Insurance</option>
  <option>Admin</option>
  <option>Other</option>
</select><br><br>

Subtotal: <input id="subtotal"><br><br>
GST/HST: <input id="gst"><br><br>
PST: <input id="pst"><br><br>
Total: <input id="total"><br><br>

<button onclick="exportExcel()">Export Excel</button>

<script>

const API_KEY = "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";

document.getElementById("fileInput").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const base64 = await toBase64(file);

  const response = await fetch("https://api.openai.com/v1/responses", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + API_KEY
    },
    body: JSON.stringify({
      model: "gpt-4.1-mini",
      input: [
        {
          role: "user",
          content: [
            {
              type: "input_text",
              text: "Extract supplier, date (YYYY-MM-DD), subtotal, GST/HST, PST, total, and category. Return ONLY JSON."
            },
            {
              type: "input_image",
              image_base64: base64
            }
          ]
        }
      ]
    })
  });

  const data = await response.json();

  const text = data.output[0].content[0].text;

  const parsed = JSON.parse(text);

  document.getElementById("supplier").value = parsed.supplier || "";
  document.getElementById("date").value = parsed.date || "";
  document.getElementById("subtotal").value = parsed.subtotal || "";
  document.getElementById("gst").value = parsed.gst || "";
  document.getElementById("pst").value = parsed.pst || "";
  document.getElementById("total").value = parsed.total || "";
  document.getElementById("category").value = parsed.category || "Other";
});

function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = error => reject(error);
  });
}

function exportExcel() {
  const data = [{
    supplier: supplier.value,
    date: date.value,
    subtotal: subtotal.value,
    gst: gst.value,
    pst: pst.value,
    total: total.value,
    category: category.value
  }];

  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Receipts");
  XLSX.writeFile(wb, "receipt.xlsx");
}

</script>

</body>
</html>
